<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thời Tiết Các Tỉnh Thành Việt Nam</title>
<style>
/* --- giữ nguyên CSS cũ của bạn ở đây --- */
</style>
</head>
<body>
<div class="container">
<p class="updated-at">Cập nhật lúc 22/05/2026 11:35 | Tổng số tỉnh: 2</p>
<div class="grid">
        <div class="card" data-name="an giang">
            <div class="card-header">
                <span class="province-name">An Giang</span>
            </div>
            <div class="card-body">☁️
                <div class="temps">
                    <span class="temp-min">25°</span>
                    <span class="temp-max">33°</span>
                </div>
            </div>
            <div class="card-desc">Nhiều mây</div>
            <div class="card-footer">
                <span class="precip">💧 0 mm</span>
                <span class="wind">💨 5 km/h</span>
            </div>
        </div>

        <div class="card" data-name="bắc ninh">
            <div class="card-header">
                <span class="province-name">Bắc Ninh</span>
            </div>
            <div class="card-body">☁️
                <div class="temps">
                    <span class="temp-min">25°</span>
                    <span class="temp-max">33°</span>
                </div>
            </div>
            <div class="card-desc">Nhiều mây</div>
            <div class="card-footer">
                <span class="precip">💧 0 mm</span>
                <span class="wind">💨 5 km/h</span>
            </div>
        </div>
</div>
</div>
</body>
</html>
