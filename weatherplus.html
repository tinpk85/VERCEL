<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nowcasting Lượng Mưa — WeatherPlus</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--panel:#ffffff;--border:#dde3ea;
  --accent:#0077cc;--text:#1a2a3a;--muted:#7a93a8;
}
body{font-family:'Barlow',sans-serif;font-weight:300;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{
  background:#fff;border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
h1{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;color:var(--text);letter-spacing:-0.3px}
h1 span{color:var(--accent);font-weight:300;font-size:0.85rem;letter-spacing:2px;display:block;text-transform:uppercase}
.meta{font-size:0.75rem;color:var(--muted);text-align:right;line-height:1.7}
.meta b{color:var(--accent)}
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1}
.sidebar{
  width:320px;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sidebar-inner{overflow-y:auto;flex:1;padding:16px}
.sidebar-inner::-webkit-scrollbar{width:4px}
.sidebar-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sec-title{
  font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--accent);
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.timeline{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.timeline .sec-title{margin-bottom:8px}
.step-info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.step-time{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:var(--text)}
.step-offset{font-size:0.8rem;color:var(--muted)}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;margin-bottom:8px}
.play-row{display:flex;gap:8px;align-items:center}
.btn{
  background:var(--border);border:1px solid var(--muted);color:var(--text);
  padding:5px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.82rem;
  transition:all .2s;
}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.speed-lbl{font-size:0.75rem;color:var(--muted);margin-left:auto}
.mini-chart{position:relative;height:70px;display:flex;align-items:flex-end;gap:2px;margin-top:4px}
.mini-bar{
  flex:1;border-radius:3px 3px 0 0;
  background:linear-gradient(to top,rgba(0,119,204,0.2),rgba(0,119,204,0.7));
  cursor:pointer;transition:opacity .15s;
}
.mini-bar:hover{opacity:0.7}
.mini-bar.active-bar{background:linear-gradient(to top,#ff6600,#ffaa00)!important;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:#eef2f7;border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700}
.stat-lbl{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.prov-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:8px;margin-bottom:4px;
  background:#eef2f7;border:1px solid var(--border);
  cursor:pointer;transition:border-color .2s;
}
.prov-item:hover{border-color:var(--accent)}
.prov-name{font-size:0.85rem;font-weight:500}
.prov-mm{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700}
.legend{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.legend-title{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.legend-bar{display:flex;height:14px;border-radius:4px;overflow:hidden;margin-bottom:4px}
.legend-lbl{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted)}

.leaflet-popup-content-wrapper{background:#fff;border:1px solid var(--border);border-radius:12px;color:var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.15);}
.leaflet-popup-tip{background:#fff}
.popup-inner{font-family:'Barlow',sans-serif;font-size:0.85rem;line-height:1.6; padding: 6px;}
.popup-header-flex{display:flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f2f5; padding-bottom: 4px; margin-bottom: 6px;}
.popup-main-mm{display:flex; align-items: center; gap: 6px;}
.popup-icon{font-size:2.2rem;}
.popup-mm{font-family:'Barlow Condensed',sans-serif;font-size:2.5rem;font-weight:900; line-height: 1;}
.popup-coords{font-size:0.75rem; color:var(--muted); text-align: right; line-height: 1.3;}

.forecast-container{margin-top: 8px;}
.forecast-title{font-family:'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 6px;}
#popForecastChart{width: 100% !important; height: 130px !important;}
</style>
</head>
<body>

<header>
  <div>
    <h1><span>WeatherPlus Nowcasting</span>Bản Đồ Dự Báo Mưa</h1>
  </div>
  <div class="meta">
    <div>Crawled: <b>2026-05-25 07:00</b></div>
    <div>Tỉnh: <b>9</b> &nbsp;·&nbsp; Bước: <b>18 × 10 phút</b></div>
  </div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="timeline">
      <div class="sec-title">Timeline dự báo</div>
      <div class="step-info">
        <span class="step-time" id="stepTime">06:50</span>
        <span class="step-offset" id="stepOffset">+10 phút</span>
      </div>
      <input type="range" id="slider" min="0" max="17" value="0" step="1">
      <div class="mini-chart" id="miniChart"></div>
      <div class="play-row" style="margin-top:8px">
        <button class="btn" id="btnPlay">▶ Play</button>
        <button class="btn" id="btnReset">⟳</button>
        <span class="speed-lbl" id="speedLbl">1×</span>
        <button class="btn" id="btnSpeed">Faster</button>
      </div>
    </div>
    <div class="sidebar-inner">
      <div class="sec-title">Thống kê bước hiện tại</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val" id="sMax" style="color:#ff6600">—</div><div class="stat-lbl">Max mm</div></div>
        <div class="stat"><div class="stat-val" id="sMean" style="color:#38b6ff">—</div><div class="stat-lbl">TB mm</div></div>
        <div class="stat"><div class="stat-val" id="sPct" style="color:#a8e063">—</div><div class="stat-lbl">% Có mưa</div></div>
      </div>
      <div class="sec-title" style="margin-top:8px">Theo từng tỉnh</div>
      <div id="provList"></div>
    </div>
    <div class="legend">
      <div class="legend-title">Cường độ mưa (mm / 10 phút)</div>
      <div class="legend-bar" id="legendBar"></div>
      <div class="legend-lbl"><span>0</span><span>0.5</span><span>1</span><span>2</span><span>3+</span></div>
    </div>
  </div>
</div>

];

let currentPopupChart = null;

function mmColor(mm) {
  for (let i = RAIN_COLORS.length-1; i >= 0; i--)
    if (mm >= RAIN_COLORS[i][0]) return RAIN_COLORS[i][1];
  return RAIN_COLORS[0][1];
}

function getRainIcon(mm) {
  if (mm <= 0.05) return "☀️";
  if (mm <= 0.3)  return "☁️";
  if (mm <= 0.8)  return "🌦️";
  if (mm <= 2.0)  return "🌧️";
  return "⛈️";
}

// Thuật toán hình học dự phòng (Chỉ dùng khi mất kết nối mạng gọi API OpenStreetMap)
function getFallbackProvince(lat, lng) {
  let nearestProv = "Ngoài Vùng quét";
  let minDist = Infinity;
  for (const [prov, center] of Object.entries(PROV_CENTERS)) {
    const d = Math.pow(lat - center[0], 2) + Math.pow(lng - center[1], 2);
    if (d < minDist) { minDist = d; nearestProv = prov; }
  }
  return nearestProv;
}

  [8.33,  103.5],
  [12.7,  109.5]
);

const map = L.map("map", {zoomControl:true, maxBounds: BOUNDS.pad(0.15)});

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

const CELL = 0.01;
let gridLayer  = L.layerGroup().addTo(map);

function renderStep(stepIdx) {
  gridLayer.clearLayers();
  const lbl = STEPS[stepIdx];
  const pts = STEPS_DATA[lbl] || [];

  pts.forEach(pt => {
    const [lat, lng, mm] = pt;
    const col  = mmColor(mm);
    const opac = mm < 0.05 ? 0.18 : 0.72;
    const half = CELL / 2;

    const rect = L.rectangle(
      [[lat - half, lng - half], [lat + half, lng + half]],
      { color:"transparent", weight:0, fillColor:col, fillOpacity:opac, interactive:true }
    );

    rect.on('click', function(e) {
      const rainfallTrend = STEPS.map(st => {
        const stepPts = STEPS_DATA[st] || [];
        const match = stepPts.find(p => Math.abs(p[0] - lat) < 0.001 && Math.abs(p[1] - lng) < 0.001);
        return match ? match[2] : 0;

          </div>
          
          <div class="popup-main-mm">
            <span class="popup-icon">${getRainIcon(mm)}</span>
            <span class="popup-mm" style="color:${col}">${mm.toFixed(2)}</span>
            <span style="font-size:1.1rem; font-weight:700; color:var(--text); margin-left:-2px; align-self:flex-end; padding-bottom:6px;">mm/10p</span>
          </div>
          
          <div class="forecast-container">
            <div class="forecast-title">Xu hướng lượng mưa kế tiếp (3 giờ):</div>
            <canvas id="popForecastChart"></canvas>
          </div>
        </div>`;

      this.bindPopup(popupContent, {minWidth: 450, maxWidth: 480}).openPopup();

      // ── GIẢI QUYẾT VẤN ĐỀ 2: GỌI API REVERSE GEOCODING CỦA OPENSTREETMAP ĐỂ TRÍCH XUẤT RANH GIỚI THỰC TẾ ──
      const osmUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=8`;
      fetch(osmUrl, { headers: { 'Accept-Language': 'vi' } })
        .then(res => res.json())
        .then(data => {
          if (data && data.address) {
            let exactName = data.address.province || data.address.city || data.address.state || "Biên Giới / Ngoài Vùng";

            document.getElementById("popProvTitle").textContent = "📍 " + exactName;
          } else {
            document.getElementById("popProvTitle").textContent = "📍 " + getFallbackProvince(lat, lng);
          }
        })
        .catch(() => {
          // Chuyển sang thuật toán hình học dự phòng khi mất kết nối mạng

        if(currentPopupChart) currentPopupChart.destroy();

        const barColors = STEPS.map(st => st === lbl ? '#ff6600' : '#8cd3ff');
        const borderColors = STEPS.map(st => st === lbl ? '#cc5200' : '#49b4ff');

        currentPopupChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: STEPS,
            datasets: [{
              data: rainfallTrend,
              backgroundColor: barColors,
              borderColor: borderColors,
              borderWidth: 1,
              borderRadius: 2,
              barPercentage: 0.75
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const v = context.parsed.y;
                    return ` Lượng mưa: ${v.toFixed(2)} mm ${getRainIcon(v)}`;
                  }
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: {
                  font: { size: 9, family: 'Barlow' },
                  maxRotation: 0,
                  callback: function(val, index) { return index % 2 === 0 ? this.getLabelForValue(val) : ''; }
                }
              },
              y: {
                beginAtZero: true,
                title: { display: true, text: 'mm', font: {size: 10, weight: 700} },
                ticks: { font: { size: 9 } }
              }
            }
          }
        });
      }, 100);
    });

    rect.addTo(gridLayer);
  });

  const s = STATS[stepIdx];
  document.getElementById("stepTime").textContent   = lbl;
  document.getElementById("stepOffset").textContent = `+${(stepIdx+1)*10} phút`;
  document.getElementById("sMax").textContent   = s.max.toFixed(2);
  document.getElementById("sMean").textContent  = s.mean.toFixed(2);
  document.getElementById("sPct").textContent   = s.pct.toFixed(1)+'%';

  document.querySelectorAll(".mini-bar").forEach((b,i) =>
    b.classList.toggle("active-bar", i === stepIdx));

  // Đồng bộ hóa danh sách phân cấp Sidebar (Dùng ranh giới dự phòng để đảm bảo hiệu năng kéo thả slider không bị lag)
  const provMax = {};
  ALL_LOCATIONS.forEach(name => { provMax[name] = null; });

  pts.forEach(([lat, lng, mm]) => { 
    const prov = getFallbackProvince(lat, lng);
    if (provMax[prov] === null || mm > provMax[prov]) provMax[prov] = mm; 
  });

  const provList = document.getElementById("provList");
  provList.innerHTML = "";
  
  Object.entries(provMax).sort((a,b) => {
    if (a[1] === null) return 1;
    if (b[1] === null) return -1;
    return b[1] - a[1];
  }).forEach(([name, mx]) => {
    const div = document.createElement("div");
    div.className = "prov-item";
    if (mx === null) {
      div.innerHTML = `<span class="prov-name">📍 ${name}</span><span class="prov-mm" style="color:var(--muted);font-size:0.75rem;font-weight:300">Không có dữ liệu</span>`;
    } else {
      const col = mmColor(mx);
      const icon = getRainIcon(mx);
      div.innerHTML = `<span class="prov-name">📍 ${name}</span><span class="prov-mm" style="color:${col}">${icon} ${mx.toFixed(2)} mm</span>`;
    }
    div.onclick = () => { const c = PROV_CENTERS[name]; if (c) map.setView(c, 10); };
    provList.appendChild(div);
  });
}

map.on('popupclose', function() {
  if(currentPopupChart) {
    currentPopupChart.destroy();
    currentPopupChart = null;
  }
});

const miniChart  = document.getElementById("miniChart");
const maxStatPct = Math.max(...STATS.map(s=>s.pct));
STATS.forEach((s, i) => {
  const bar = document.createElement("div");
  bar.className   = "mini-bar";
  bar.style.height = (s.pct / maxStatPct * 100).toFixed(0) + "%";
  bar.title        = `${s.time} — ${s.pct}% có mưa`;
  bar.onclick      = () => { document.getElementById("slider").value = i; currentStep = i; renderStep(i); };
  miniChart.appendChild(bar);
});

const legendBar = document.getElementById("legendBar");
RAIN_COLORS.forEach(([,col]) => {
  const seg = document.createElement("div");
  seg.style.cssText = `flex:1;background:${col}`;
  legendBar.appendChild(seg);
});

let currentStep = 0, playTimer = null, playSpeed = 800, speedIdx = 0;
const speeds = [800, 400, 200];
const slider  = document.getElementById("slider");
const btnPlay = document.getElementById("btnPlay");

slider.addEventListener("input", () => { currentStep = +slider.value; renderStep(currentStep); });

btnPlay.addEventListener("click", () => {
  if (playTimer) {
    clearInterval(playTimer); playTimer = null;
    btnPlay.textContent = "▶ Play"; btnPlay.classList.remove("active");
  } else {
    btnPlay.textContent = "⏸ Pause"; btnPlay.classList.add("active");
    playTimer = setInterval(() => {
      currentStep = (currentStep + 1) % STEPS.length;
      slider.value = currentStep; renderStep(currentStep);
    }, playSpeed);
  }
});

document.getElementById("btnReset").addEventListener("click", () => {
  if (playTimer) { clearInterval(playTimer); playTimer = null; btnPlay.textContent="▶ Play"; btnPlay.classList.remove("active"); }
  currentStep = 0; slider.value = 0; renderStep(0);
});

document.getElementById("btnSpeed").addEventListener("click", () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  playSpeed = speeds[speedIdx];
  document.getElementById("speedLbl").textContent = ["1×","2×","4×"][speedIdx];
  if (playTimer) {
    clearInterval(playTimer);
    playTimer = setInterval(() => { currentStep=(currentStep+1)%STEPS.length; slider.value=currentStep; renderStep(currentStep); }, playSpeed);
  }
});

renderStep(0);
</script>
</body>
</html>
